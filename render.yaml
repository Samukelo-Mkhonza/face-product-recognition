services:
  - type: web
    name: face-product-recognition-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATA_DIR
        value: /app/data
      - key: CORS_ORIGINS
        value: https://samukelo-mkhonza.github.io
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
