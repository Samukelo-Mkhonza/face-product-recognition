services:
  api:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      - CORS_ORIGINS=http://localhost:5173
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: node:20-slim
    working_dir: /frontend
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api
